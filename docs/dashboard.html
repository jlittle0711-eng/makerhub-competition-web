<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>Admin Dashboard</h1>

<button onclick="logout()">Logout</button>

<h2>Create New Entry</h2>

<select id="type">
    <option value="competition">Competition</option>
    <option value="exhibit">Exhibit</option>
</select>

<br><br>

<input id="title" placeholder="Title"><br><br>
<textarea id="description" placeholder="Description"></textarea><br><br>

<button onclick="submitEntry()">Submit</button>

<h2>Submitted Items</h2>

<div id="list"></div>

<script>
if (localStorage.getItem("admin") !== "true") {
    window.location.href = "admin.html";
}

function logout() {
    localStorage.removeItem("admin");
    window.location.href = "admin.html";
}

function submitEntry() {
    const type = document.getElementById("type").value;
    const title = document.getElementById("title").value;
    const description = document.getElementById("description").value;

    const data = JSON.parse(localStorage.getItem("submissions") || "[]");

    data.push({ type, title, description });

    localStorage.setItem("submissions", JSON.stringify(data));

    render();
}

function render() {
    const container = document.getElementById("list");
    const data = JSON.parse(localStorage.getItem("submissions") || "[]");

    container.innerHTML = "";

    data.forEach(item => {
        const div = document.createElement("div");
        div.style.border = "1px solid #ccc";
        div.style.margin = "10px";
        div.style.padding = "10px";

        div.innerHTML = `
            <strong>${item.type.toUpperCase()}</strong>
            <h3>${item.title}</h3>
            <p>${item.description}</p>
        `;

        container.appendChild(div);
    });
}

render();
</script>

</body>
</html>
