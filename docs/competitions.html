<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Competitions</title>
<link rel="stylesheet" href="styles.css">

<style>
.comp-card {
    border: 2px solid red;
    padding: 15px;
    margin: 15px;
    cursor: pointer;
    transition: all 0.2s ease;
}

.comp-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 0 12px #d4af37;
}

.comp-title {
    color: #d4af37;
    text-decoration: underline;
}
</style>

</head>

<body>

<div id="nav-container"></div>
<script src="loadComponents.js"></script>

<h1>Competitions</h1>

<div id="competition-list"></div>

<!-- ✅ CACHE-BUSTED -->
<script src="data/competitions.js?v=2"></script>

<script>
const container = document.getElementById("competition-list");

competitions.forEach(comp => {
    const div = document.createElement("div");
    div.className = "comp-card";

    // ✅ WHOLE CARD CLICKABLE
    div.onclick = () => {
        window.location.href = `competition.html?id=${comp.id}`;
    };

    div.innerHTML = `
        <h2 class="comp-title">${comp.title}</h2>
        <p>${comp.description}</p>
        <p><strong>Level:</strong> ${comp.level}</p>
        <p><strong>Category:</strong> ${comp.category}</p>
        <p><strong>Status:</strong> ${comp.status}</p>
    `;

    container.appendChild(div);
});
</script>

</body>
</html>
