<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Competitions</title>
<link rel="stylesheet" href="styles.css">

<style>
a.comp-link {
    color: #d4af37;
    text-decoration: underline;
    transition: all 0.2s ease;
}

a.comp-link:hover {
    color: #ffffff;
    text-shadow: 0 0 8px #d4af37;
}
</style>

</head>

<body>

<div id="nav-container"></div>
<script src="loadComponents.js"></script>

<h1>Competitions</h1>

<div id="competition-list"></div>

<script src="data/competitions.js"></script>

<script>
const container = document.getElementById("competition-list");

competitions.forEach(comp => {
    const div = document.createElement("div");
    div.style.border = "2px solid red";
    div.style.padding = "15px";
    div.style.margin = "15px";

    div.innerHTML = `
        <h2>
            <a class="comp-link" href="competition.html?id=${comp.id}">
                ${comp.title}
            </a>
        </h2>
        <p>${comp.description}</p>
        <p><strong>Level:</strong> ${comp.level}</p>
        <p><strong>Category:</strong> ${comp.category}</p>
        <p><strong>Status:</strong> ${comp.status}</p>
    `;

    container.appendChild(div);
});
</script>

</body>
</html>
