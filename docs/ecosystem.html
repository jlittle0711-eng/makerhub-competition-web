<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MakerHub Ecosystem</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="nav-container"></div>
<script src="loadComponents.js"></script>

<h1>MakerHub Ecosystem</h1>

<div id="eco-list"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
const container = document.getElementById("eco-list");

async function render() {
    try {
        console.log("🔥 STARTING FIREBASE LOAD");

        // 🚨 NO FILTER — GET EVERYTHING
        const snapshot = await db.collection("entries").get();

        console.log("📦 DOCUMENT COUNT:", snapshot.size);

        if (snapshot.empty) {
            container.innerHTML = "<p>No entries found in database.</p>";
            return;
        }

        container.innerHTML = "";

        snapshot.forEach(doc => {
            const item = doc.data();

            console.log("✅ ITEM:", item);

            const div = document.createElement("div");
            div.style.border = "2px solid red";
            div.style.margin = "15px";
            div.style.padding = "15px";
            div.style.cursor = "pointer";

            div.onclick = () => {
                if (item.type === "competition") {
                    window.location.href = `competition-live.html?id=${doc.id}`;
                } else {
                    window.location.href = `exhibit-live.html?id=${doc.id}`;
                }
            };

            div.innerHTML = `
                <strong>${item.type || "UNKNOWN"}</strong>
                <h2 style="color:#d4af37;">${item.title || "No Title"}</h2>
                <p>${item.description || "No Description"}</p>
                <p><strong>Status:</strong> ${item.status || "none"}</p>
            `;

            container.appendChild(div);
        });

    } catch (err) {
        console.error("🔥 ERROR:", err);
        container.innerHTML = "<p style='color:red;'>Error loading data</p>";
    }
}

render();
</script>

</body>
</html>
