<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MakerHub Ecosystem</title>
<link rel="stylesheet" href="styles.css">

<style>
.eco-card {
    border: 2px solid red;
    padding: 15px;
    margin: 15px;
    cursor: pointer;
}

.eco-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 0 12px #d4af37;
}

.eco-title {
    color: #d4af37;
    text-decoration: underline;
}

.badge {
    display:inline-block;
    padding:4px 8px;
    margin-bottom:5px;
    background:#333;
    color:#fff;
    font-size:12px;
}
</style>

</head>

<body>

<div id="nav-container"></div>
<script src="loadComponents.js"></script>

<h1>MakerHub Ecosystem</h1>

<p>Browse all competitions and exhibits in one unified system.</p>

<select id="typeFilter">
    <option value="">All Types</option>
    <option value="competition">Competitions</option>
    <option value="exhibit">Exhibits</option>
</select>

<div id="eco-list"></div>

<script src="data/competitions.js?v=2"></script>
<script src="data/exhibits.js?v=1"></script>

<script>
const container = document.getElementById("eco-list");
const typeFilter = document.getElementById("typeFilter");

function render() {

    container.innerHTML = "";

    let items = [];

    competitions.forEach(c => {
        items.push({...c, type: "competition"});
    });

    exhibits.forEach(e => {
        items.push({...e, type: "exhibit"});
    });

    const filter = typeFilter.value;

    items
        .filter(i => !filter || i.type === filter)
        .forEach(item => {

            const div = document.createElement("div");
            div.className = "eco-card";

            div.onclick = () => {
                if (item.type === "competition") {
                    window.location.href = `competition.html?id=${item.id}`;
                } else {
                    window.location.href = `exhibit.html?id=${item.id}`;
                }
            };

            div.innerHTML = `
                <div class="badge">${item.type.toUpperCase()}</div>

                <h2 class="eco-title">${item.title}</h2>

                <p>${item.description}</p>

                <p><strong>Category:</strong> ${item.category}</p>
                <p><strong>Level:</strong> ${item.level}</p>
                <p><strong>Status:</strong> ${item.status}</p>
            `;

            container.appendChild(div);
        });
}

typeFilter.addEventListener("change", render);

render();
</script>

</body>
</html>
