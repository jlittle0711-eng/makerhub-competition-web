<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MakerHub Ecosystem</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="nav-container"></div>
<script src="loadComponents.js"></script>

<h1>MakerHub Ecosystem</h1>

<div id="eco-list"></div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script src="firebase-config.js"></script>
<script src="live-data.js"></script>

<script>
const container = document.getElementById("eco-list");

async function render() {
    const items = await loadLiveEntries();

    container.innerHTML = "";

    items.forEach(item => {
        const div = document.createElement("div");
        div.style.border = "2px solid red";
        div.style.margin = "15px";
        div.style.padding = "15px";
        div.style.cursor = "pointer";

        div.onclick = () => {
            alert("Detail page integration next step");
        };

        div.innerHTML = `
            <strong>${item.type.toUpperCase()}</strong>
            <h2 style="color:#d4af37;">${item.title}</h2>
            <p>${item.description}</p>
        `;

        container.appendChild(div);
    });
}

render();
</script>

</body>
</html>
